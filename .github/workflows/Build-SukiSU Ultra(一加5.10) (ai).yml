name: Build OnePlus Kernel (Full Features)
on:
  workflow_dispatch:
    inputs:
      CPU:
        description: "分支 (e.g. sm8475)"
        required: true
        default: 'sm8475'
      FEIL:
        description: "配置文件 (e.g. oneplus_ace2_v)"
        required: true
        default: 'oneplus_ace2_v'
      CPUD:
        description: "处理器代号 (e.g. waipio)"
        required: true
        default: 'waipio'
      ANDROID_VERSION:
        description: "安卓版本"
        required: true
        default: 'android12'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '5.10'
      KERNEL_NAME:
        description: "内核名称后缀"
        required: true
        default: '-OKI'
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - Kernel
          - SukiSU Ultra
        default: SukiSU Ultra
      SUSFS_ENABLED:
        description: "启用 SUSFS"
        required: true
        type: boolean
        default: true
      VFS_patch_ENABLED:
        description: "启用 VFS 补丁"
        required: true
        type: choice
        options:
          - enable
          - disable
        default: enable

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KERNEL_DIR: kernel_workspace/kernel_platform
    
    steps:
      # ========== 初始化环境 ==========
      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 12288
          temp-reserve-mb: 4096
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: 配置 Git
        run: |
          git config --global user.name "Kernel Builder"
          git config --global user.email "builder@kernel.org"
          git config --global color.ui false

      # ========== 安装依赖 ==========
      - name: 安装系统依赖
        run: |
          sudo apt update && sudo apt full-upgrade -y
          sudo apt install -y \
            python3 git curl flex bison libssl-dev bc kmod \
            libelf-dev device-tree-compiler dwarves zstd \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: 安装 repo 工具
        run: |
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/

      # ========== 同步代码 ==========
      - name: 初始化仓库
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b oneplus/${{ inputs.CPU }} \
            -m ${{ inputs.FEIL }}.xml \
            --depth=1
          repo sync -j$(nproc) \
            --force-sync \
            --no-clone-bundle \
            --no-tags
          
          # 清理保护符号
          rm -vf common/android/abi_gki_protected_exports_*
          rm -vf msm-kernel/android/abi_gki_protected_exports_*
          
          # 修复 dirty 标记
          find . -name setlocalversion -exec sed -i 's/ -dirty//g' {} +

      # ========== KernelSU 集成 ==========
      - name: 安装 SukiSU Ultra
        if: ${{ inputs.kernelsu_variant == 'SukiSU Ultra' }}
        run: |
          cd $KERNEL_DIR
          branch_flag=$([ "${{ inputs.kernelsu_version }}" == "tag" ] && echo "" || echo "-s susfs-dev")
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/kernel/setup.sh" | bash $branch_flag
          
          # 更新版本号
          cd KernelSU
          commit_count=$(git rev-list --count main)
          ksu_version=$((commit_count + 10606))
          sed -i "s/DKSU_VERSION=12500/DKSU_VERSION=$ksu_version/" kernel/Makefile
          echo "KSU_VERSION=$ksu_version" >> $GITHUB_ENV

      # ========== 补丁应用 ==========
      - name: 应用 SUSFS 补丁
        if: ${{ inputs.SUSFS_ENABLED }}
        run: |
          cd $KERNEL_DIR
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ inputs.ANDROID_VERSION }}-${{ inputs.KERNEL_VERSION }}
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          
          # 复制补丁文件
          cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch common/
          cp -r susfs4ksu/kernel_patches/{fs,include}/* common/
          cp -r SukiSU_patch/other/lz4k/{include,lib,crypto}/* common/
          
          # 应用主补丁
          cd common
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.ANDROID_VERSION }}-${{ inputs.KERNEL_VERSION }}.patch || true

      - name: 应用隐藏补丁
        if: ${{ inputs.SUSFS_ENABLED }}
        run: |
          cd $KERNEL_DIR/common
          cp ../../SukiSU_patch/69_hide_stuff.patch .
          patch -p1 -F 3 < 69_hide_stuff.patch

      - name: 应用 VFS 补丁
        if: ${{ inputs.VFS_patch_ENABLED == 'enable' }}
        run: |
          cd $KERNEL_DIR/common
          cp ../../SukiSU_patch/hooks/new_hooks.patch .
          patch -p1 -F 3 < new_hooks.patch
          
          # 应用 LZ4K 补丁
          if [ "${{ inputs.KERNEL_VERSION }}" != "5.10" ]; then
            cp ../../SukiSU_patch/other/lz4k_patch/${{ inputs.KERNEL_VERSION }}/lz4kd.patch .
            patch -p1 -F 3 < lz4kd.patch || true
          fi

      # ========== 内核配置 ==========
      - name: 配置内核参数
        run: |
          cd $KERNEL_DIR
          # 核心配置
          sed -i 's/CONFIG_ZRAM=.*/CONFIG_ZRAM=m/g' common/arch/arm64/configs/gki_defconfig
          sed -i 's/CONFIG_ZSMALLOC=.*/CONFIG_ZSMALLOC=m/g' common/arch/arm64/configs/gki_defconfig
          sed -i 's/CONFIG_MODULE_SIG=.*/CONFIG_MODULE_SIG=n/g' common/arch/arm64/configs/gki_defconfig
          
          # 压缩算法
          echo "CONFIG_CRYPTO_LZ4K=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4KD=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4HC=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_842=y" >> common/arch/arm64/configs/gki_defconfig
          
          # SUSFS 配置
          if ${{ inputs.SUSFS_ENABLED }}; then
            echo "CONFIG_KSU_SUSFS=y" >> common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> common/arch/arm64/configs/gki_defconfig
          fi
          
          # 修复编译检查
          sed -i 's/check_defconfig//' common/build.config.gki

      # ========== 编译内核 ==========
      - name: 编译内核
        run: |
          cd kernel_workspace
          export LTO=thin
          ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ inputs.CPUD }} gki
          
          # 验证输出文件
          [ -f out/dist/Image ] || (echo "Image 文件未生成!" && exit 1)
          [ -f out/dist/boot.img ] || echo "警告: boot.img 未生成"

      # ========== 打包产物 ==========
      - name: 准备 AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3
          rm -rf AnyKernel3/.git
          
          # 复制内核文件
          cp kernel_workspace/out/dist/Image AnyKernel3/
          
          # 收集内核模块
          mkdir -p AnyKernel3/modules
          find kernel_workspace -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          # 生成版本信息
          echo "Kernel Version: ${{ inputs.KERNEL_NAME }}" > AnyKernel3/version
          [ -n "$KSU_VERSION" ] && echo "KernelSU: $KSU_VERSION" >> AnyKernel3/version

      # ========== 上传产物 ==========
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_${{ inputs.FEIL }}_${{ env.KSU_VERSION }}
          path: |
            AnyKernel3/*
            kernel_workspace/out/dist/*
          retention-days: 7

      - name: 上传调试信息
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build_Logs_${{ inputs.FEIL }}
          path: |
            kernel_workspace/out/*.log
            kernel_workspace/**/build_error.log